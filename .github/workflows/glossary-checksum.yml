name: Glossary Checksum

on:
  push:
    paths:
      - 'Hollow_House_Standards_Library/glossary.md'
      - 'Hollow_House_Standards_Library/glossary.json'
  pull_request:
    paths:
      - 'Hollow_House_Standards_Library/glossary.md'
      - 'Hollow_House_Standards_Library/glossary.json'

permissions:
  contents: read

jobs:
  checksum:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify glossary checksum
        run: |
          echo "Verifying glossary file integrity..."
          md5sum Hollow_House_Standards_Library/glossary.md
          md5sum Hollow_House_Standards_Library/glossary.json
