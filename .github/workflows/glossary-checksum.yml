name: Glossary Checksum Enforcement

on:
  push:
    paths:
      - 'glossary.json'
      - 'glossary.md'
  pull_request:

jobs:
  enforce-checksum:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify checksum file exists
        run: |
          if [ ! -f glossary.sha256 ]; then
            echo "❌ glossary.sha256 missing — Governance Drift"
            exit 1
          fi

      - name: Recalculate checksum
        run: |
          sha256sum glossary.json > current.sha256

      - name: Compare checksums
        run: |
          if ! diff -q glossary.sha256 current.sha256; then
            echo "❌ Checksum mismatch — Governance Drift detected"
            exit 1
          else
            echo "✅ Glossary integrity verified"
          fi
