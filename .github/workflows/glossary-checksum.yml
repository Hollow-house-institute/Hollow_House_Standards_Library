name: Glossary Integrity Check

on:
  push:
    paths:
      - 'glossary.md'
      - 'glossary.json'

jobs:
  checksum:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify glossary files
        run: |
          echo 'Checking glossary files...'
          if [ -f glossary.md ]; then sha256sum glossary.md; else echo 'glossary.md missing'; fi
          if [ -f glossary.json ]; then sha256sum glossary.json; else echo 'glossary.json missing'; fi
