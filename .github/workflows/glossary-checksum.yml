name: Glossary Checksum

# Trigger only on changes to glossary files
on:
  push:
    paths:
      - 'Hollow_House_Standards_Library/glossary.md'
      - 'Hollow_House_Standards_Library/glossary.json'
  pull_request:
    paths:
      - 'Hollow_House_Standards_Library/glossary.md'
      - 'Hollow_House_Standards_Library/glossary.json'

# Minimal permissions for security
permissions:
  contents: read   # Only allow read access to repository contents

jobs:
  checksum:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Verify glossary checksum
      - name: Verify glossary checksum
        run: |
          echo "Verifying glossary file integrity..."
          # Example checksum command
          md5sum Hollow_House_Standards_Library/glossary.md
          md5sum Hollow_House_Standards_Library/glossary.json

      # Step 3 (Optional): Fail on checksum mismatch
      # - name: Fail if checksum mismatch
      #   run: |
      #     echo "Add your checksum comparison logic here"
      #     exit 1
