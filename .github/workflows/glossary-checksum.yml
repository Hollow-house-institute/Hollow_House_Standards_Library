name: Glossary Checksum

on:
  push:
  pull_request:

jobs:
  checksum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run checksum safely
        run: |
          echo "Checking glossary files..."

          if [ -f glossary.md ]; then
            sha256sum glossary.md
          else
            echo "glossary.md not found — skipping"
          fi

          if [ -f glossary.json ]; then
            sha256sum glossary.json
          else
            echo "glossary.json not found — skipping"
          fi

          echo "Workflow completed successfully"
