name: Glossary Checksum Validation

on:
  push:
    paths:
      - 'glossary.json'
      - 'glossary.md'
  pull_request:

jobs:
  checksum:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate checksum
        run: |
          sha256sum glossary.json > glossary.sha256

      - name: Validate checksum exists
        run: |
          if [ ! -f glossary.sha256 ]; then
            echo "Checksum file missing"
            exit 1
          fi
