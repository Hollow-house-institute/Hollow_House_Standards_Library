name: Glossary Checksum Enforcement

on:
  push:
    paths:
      - glossary.json
      - glossary.md
  pull_request:

jobs:
  enforce-checksum:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Verify checksum file exists
        run: |
          if [ ! -f glossary.sha256 ]; then
            echo "Checksum file missing"
            echo "non-blocking"
          fi

      - name: Recalculate checksum
        run: |
          sha256sum glossary.json > current.sha256

      - name: Compare checksums
        run: |
          diff -q glossary.sha256 current.sha256 || (echo "Checksum mismatch" && echo "non-blocking")
