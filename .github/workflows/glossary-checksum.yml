name: Glossary Check

on:
  push:
    paths:
      - glossary.md
      - glossary.json

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check glossary files
        run: |
          echo "Checking glossary integrity"
          if [ -f glossary.md ]; then sha256sum glossary.md; else echo "glossary.md missing"; fi
          if [ -f glossary.json ]; then sha256sum glossary.json; else echo "glossary.json missing"; fi
