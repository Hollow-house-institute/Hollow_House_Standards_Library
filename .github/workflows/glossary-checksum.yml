name: Glossary Checksum

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  checksum:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate checksums (non-failing)
        run: |
          echo 'Generating checksums for glossary files'

          if [ -f glossary.md ]; then
            sha256sum glossary.md || true
          else
            echo 'glossary.md not found — skipping'
          fi

          if [ -f glossary.json ]; then
            sha256sum glossary.json || true
          else
            echo 'glossary.json not found — skipping'
          fi

          echo 'Workflow completed successfully'
