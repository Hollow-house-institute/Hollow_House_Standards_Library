name: checksum-enforce

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify-checksum:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify checksum integrity
        run: |
          if [ ! -f CHECKSUMS.sha256 ]; then
            echo "STOP — CHECKSUMS.sha256 missing"
            exit 1
          fi

          sha256sum -c CHECKSUMS.sha256 > result.txt 2>&1 || true

          if grep -E "FAILED|No such file" result.txt; then
            echo "STOP — Checksum mismatch detected"
            cat result.txt
            exit 1
          fi

          echo "Checksum integrity verified"
