name: Glossary Integrity Check

on:
  push:
    branches: [ main ]

jobs:
  glossary-check:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Verify glossary files
        run: |
          echo 'Checking glossary files'

          if [ -f glossary.json ]; then
            echo 'glossary.json found'
            sha256sum glossary.json || true
          else
            echo 'glossary.json missing'
          fi

          if [ -f glossary.md ]; then
            echo 'glossary.md found'
            sha256sum glossary.md || true
          else
            echo 'glossary.md missing'
          fi

          echo 'Glossary integrity check complete'
