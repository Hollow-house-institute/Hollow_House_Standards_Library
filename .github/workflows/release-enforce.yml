name: release-enforce

on:
  release:
    types: [created]

jobs:
  enforce-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Ensure canonical checksum exists ---
      - name: Verify canonical checksum exists
        run: |
          if [ ! -f CANONICAL_CHECKSUMS.sha256 ]; then
            echo "STOP — Missing canonical checksum"
            exit 1
          fi

      # --- Build filtered canonical set ---
      - name: Build filtered canonical set
        run: |
          > filtered.sha256
          while read -r hash file; do
            if [ -f "$file" ]; then
              printf "%s  %s\n" "$hash" "$file" >> filtered.sha256
            fi
          done < CANONICAL_CHECKSUMS.sha256

      # --- Validate canonical integrity only ---
      - name: Validate canonical integrity
        run: |
          sha256sum -c filtered.sha256 > result.txt 2>&1 || true

          if grep -E "FAILED" result.txt; then
            echo "STOP — Release blocked: canonical integrity violation"
            cat result.txt
            exit 1
          fi

          echo "Release integrity verified (canonical scope)"

      # --- Optional: ensure CITATION exists ---
      - name: Verify citation metadata
        run: |
          if [ ! -f CITATION.cff ]; then
            echo "STOP — Missing CITATION.cff"
            exit 1
          fi

          echo "Citation metadata present"

      - name: Release check complete
        run: echo "Release passed governance enforcement"
