name: governance-check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure telemetry file exists
        run: mkdir -p GOVERNANCE && touch GOVERNANCE/telemetry.jsonl

      - name: Determine BASE and HEAD
        id: shas
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # fallback if BASE is invalid or missing
          if ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "BASE invalid, falling back to HEAD~1"
            BASE="${HEAD}~1"
          fi

          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "head=$HEAD" >> $GITHUB_OUTPUT

      - name: Capture changed files
        id: files
        run: |
          FILES="$(git diff --name-only "${{ steps.shas.outputs.base }}" "${{ steps.shas.outputs.head }}")"
          echo "$FILES"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Classify severity
        id: sev
        run: |
          FILES="${{ steps.files.outputs.files }}"
          SEV=0

          if echo "$FILES" | grep -Eq '(^|/)glossary\.json$'; then SEV=2; fi
          if echo "$FILES" | grep -Eq '(^|/)(AUTHORITY\.md|CHECKSUMS\.sha256|CODEOWNERS)$'; then SEV=3; fi

          echo "severity=$SEV" >> $GITHUB_OUTPUT

      - name: Fail-closed rules
        run: |
          FILES="${{ steps.files.outputs.files }}"

          if echo "$FILES" | grep -Eq '(^|/)glossary\.json$'; then
            if ! echo "$FILES" | grep -Eq '(^|/)CHECKSUMS\.sha256$'; then
              echo "Blocking: glossary changed without checksum"
              exit 1
            fi
          fi

          if echo "$FILES" | grep -Eq '(^|/)(AUTHORITY\.md|CHECKSUMS\.sha256|CODEOWNERS)$'; then
            echo "STOP: Protected governance files modified"
            exit 1
          fi

      - name: Enforce severity threshold
        run: |
          SEV="${{ steps.sev.outputs.severity }}"
          if [ "$SEV" -ge 3 ]; then
            echo "Blocking: severity >= 3"
            exit 1
          fi

      - name: Log telemetry (success)
        if: success()
        run: |
          echo "{\"event\":\"governance_check\",\"actor\":\"${{ github.actor }}\",\"severity\":${{ steps.sev.outputs.severity }},\"result\":\"passed\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" >> GOVERNANCE/telemetry.jsonl

      - name: Log telemetry (failure)
        if: failure()
        run: |
          echo "{\"event\":\"governance_check\",\"actor\":\"${{ github.actor }}\",\"severity\":${{ steps.sev.outputs.severity || 0 }},\"result\":\"failed\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" >> GOVERNANCE/telemetry.jsonl

      - name: Show telemetry
        run: cat GOVERNANCE/telemetry.jsonl

      - name: Upload telemetry artifact
        uses: actions/upload-artifact@v4
        with:
          name: telemetry
          path: GOVERNANCE/telemetry.jsonl
