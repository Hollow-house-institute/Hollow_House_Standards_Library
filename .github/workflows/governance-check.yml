name: governance-check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files must exist
        run: |
          test -f glossary.json
          test -f CHECKSUMS.sha256
          test -f AUTHORITY.md
          test -d GOVERNANCE

      - name: Block glossary changes without checksum update
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD="${{ github.event.pull_request.head.sha || github.sha }}"
          FILES="$(git diff --name-only "$BASE" "$HEAD")"
          echo "$FILES"
          if echo "$FILES" | grep -qx 'glossary.json'; then
            if ! echo "$FILES" | grep -qx 'CHECKSUMS.sha256'; then
              echo "glossary.json changed without CHECKSUMS.sha256 update"
              exit 1
            fi
          fi

      - name: Block missing ownership marker
        run: grep -q '@amypbui' CODEOWNERS
