name: governance-check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Core governance file presence ---
      - name: Verify required governance files
        run: |
          set -e
          required_files=(
            "AUTHORITY.md"
            "GLOSSARY_BINDING.md"
            "SYSTEM_MAP.md"
            "CANONICAL_CHECKSUMS.sha256"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "STOP — Missing required governance file: $file"
              exit 1
            fi
          done

      # --- Canonical checksum presence ---
      - name: Verify canonical checksum exists
        run: |
          if [ ! -f CANONICAL_CHECKSUMS.sha256 ]; then
            echo "STOP — Missing canonical checksum"
            exit 1
          fi

      # --- Build filtered checksum set (ignore non-existent / ephemeral files) ---
      - name: Build filtered canonical set
        run: |
          > filtered.sha256
          while read -r hash file; do
            if [ -f "$file" ]; then
              printf "%s  %s\n" "$hash" "$file" >> filtered.sha256
            fi
          done < CANONICAL_CHECKSUMS.sha256

      # --- Enforce canonical integrity ---
      - name: Validate canonical integrity
        run: |
          sha256sum -c filtered.sha256 > result.txt 2>&1 || true

          if grep -E "FAILED" result.txt; then
            echo "STOP — Canonical integrity violation"
            cat result.txt
            exit 1
          fi

          echo "Canonical integrity verified"

      # --- Glossary binding check ---
      - name: Validate glossary binding
        run: |
          if [ ! -f glossary.json ]; then
            echo "STOP — Missing glossary.json"
            exit 1
          fi

          if [ ! -f glossary.sha256 ]; then
            echo "STOP — Missing glossary checksum"
            exit 1
          fi

          sha256sum -c glossary.sha256

      # --- Final governance pass ---
      - name: Governance check complete
        run: |
          echo "Governance checks passed"
