name: governance-check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify required governance files
        run: |
          set -e
          required_files=(
            "AUTHORITY.md"
            "GLOSSARY_BINDING.md"
            "SYSTEM_MAP.md"
            "CANONICAL_CHECKSUMS.sha256"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "STOP — Missing required governance file: $file"
              exit 1
            fi
          done

      - name: Verify canonical checksum exists
        run: |
          if [ ! -f CANONICAL_CHECKSUMS.sha256 ]; then
            echo "STOP — Missing canonical checksum"
            exit 1
          fi

      - name: Build filtered canonical set
        run: |
          > filtered.sha256
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d' ' -f3-)
            if [ -f "$file" ]; then
              echo "$line" >> filtered.sha256
            fi
          done < CANONICAL_CHECKSUMS.sha256

      - name: Validate canonical integrity
        run: |
          sha256sum -c filtered.sha256 > result.txt 2>&1 || true
          if grep -E "FAILED" result.txt; then
            echo "STOP — Canonical integrity violation"
            cat result.txt
            exit 1
          fi
          echo "Canonical integrity verified"

      - name: Validate glossary binding
        run: |
          set -e
          test -f glossary.json || (echo "STOP — Missing glossary.json" && exit 1)
          test -f glossary.sha256 || (echo "STOP — Missing glossary checksum" && exit 1)
          sha256sum -c glossary.sha256 | grep OK

      - name: Governance check complete
        run: |
          echo "Governance checks passed"
