name: governance-check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure telemetry file exists
        run: mkdir -p GOVERNANCE && touch GOVERNANCE/telemetry.jsonl

      - name: Classify severity
        id: sev
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD="${{ github.event.pull_request.head.sha || github.sha }}"
          FILES="$(git diff --name-only "$BASE" "$HEAD")"
          echo "$FILES"

          SEV=0
          if echo "$FILES" | grep -q 'glossary.json'; then SEV=2; fi
          if echo "$FILES" | grep -Eq 'AUTHORITY.md|CHECKSUMS.sha256|CODEOWNERS'; then SEV=3; fi

          echo "severity=$SEV" >> $GITHUB_OUTPUT

      - name: Fail-closed rules
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD="${{ github.event.pull_request.head.sha || github.sha }}"
          FILES="$(git diff --name-only "$BASE" "$HEAD")"

          if echo "$FILES" | grep -qx 'glossary.json'; then
            if ! echo "$FILES" | grep -qx 'CHECKSUMS.sha256'; then
              echo "Blocking: glossary changed without checksum"
              exit 1
            fi
          fi

      - name: Log telemetry
        run: |
          echo "{\"event\":\"governance_check\",\"actor\":\"${{ github.actor }}\",\"severity\":${{ steps.sev.outputs.severity }},\"result\":\"passed\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" >> GOVERNANCE/telemetry.jsonl

      - name: Upload telemetry artifact
        uses: actions/upload-artifact@v4
        with:
          name: telemetry
          path: GOVERNANCE/telemetry.jsonl
